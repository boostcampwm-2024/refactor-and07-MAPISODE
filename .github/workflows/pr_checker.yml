name: PR Checker

on:
    pull_request:
        branches: [ "main", "develop" ]
    push:
        paths:
            - '**.kt'

jobs:
    build:
        name: Check Code Quality and Build
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout code
                uses: actions/checkout@v3

            -   name: Cache Gradle packages
                uses: actions/cache@v4
                with:
                    path: |
                        ~/.gradle/caches
                        ~/.gradle/wrapper
                    key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/buildSrc/**/*.kt') }}
                    restore-keys: |
                        ${{ runner.os }}-gradle-

            -   name: set up JDK 17
                uses: actions/setup-java@v3
                with:
                    java-version: '17'
                    distribution: 'temurin'
                    cache: gradle

            -   name: Add Local Properties
                env:
                    NAVER_MAP_CLIENT_ID: ${{ secrets.NAVER_MAP_CLIENT_ID }}
                    NAVER_MAP_CLIENT_SECRET: ${{ secrets.NAVER_MAP_CLIENT_SECRET }}
                    GOOGLE_GENERATIVE_AI: ${{ secrets.GOOGLE_GENERATIVE_AI }}
                    GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
                    PRIVACY_POLICY: ${{ secrets.PRIVACY_POLICY }}
                    AZURE_SUBSCRIPTION_KEY: ${{ secrets.AZURE_SUBSCRIPTION_KEY }}
                    AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
                run: |
                    echo NAVER_MAP_CLIENT_ID=$NAVER_MAP_CLIENT_ID > ./local.properties
                    echo NAVER_MAP_CLIENT_SECRET=$NAVER_MAP_CLIENT_SECRET >> ./local.properties
                    echo GOOGLE_GENERATIVE_AI=$GOOGLE_GENERATIVE_AI >> ./local.properties
                    echo GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID >> ./local.properties
                    echo PRIVACY_POLICY=$PRIVACY_POLICY >> ./local.properties
                    echo AZURE_SUBSCRIPTION_KEY=$AZURE_SUBSCRIPTION_KEY >> ./local.properties
                    echo AZURE_ENDPOINT=$AZURE_ENDPOINT >> ./local.properties

            -   name: Create google-services.json
                run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > ./app/google-services.json

            -   name: Grant execute permission for gradlew
                run: chmod +x gradlew

            -   name: Ktlint Check
                run: ./gradlew ktlintCheck

            -   name: Build Check
                run: ./gradlew build
